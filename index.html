  const halls={};D.booths.forEach(b=>{(halls[b.hall]=halls[b.hall]||[]).push(b);});
  const order=Object.keys(halls).sort();
  const legend=`<div class="maplegend"><span><b style="color:#ffe0a0">⭐ 노랑</b>=우선30(rank≤30)</span><span><b style="color:#5b8cff">파랑테</b>=TOP100</span><span>회색=여력 시</span></div>`;
  document.getElementById('map').innerHTML=legend+order.map(h=>{
    const bs=halls[h].slice().sort((a,b)=>{const x=boothKey(a),y=boothKey(b);return x[0]-y[0]||x[1].localeCompare(y[1])||x[2]-y[2];});
    const cells=bs.map(b=>{const cls=b.rank<=30?'m30':(b.top100?'m100':'');
      return `<span class="mb ${cls}" onclick="jump('${b.booth}')">${b.rank<=30?'⭐':''}${b.booth}<span class="mbs">#${b.rank}</span></span>`;}).join('');
    return `<div class="hall"><div class="htitle">홀 ${h} — ${bs.length}부스</div><div class="grid">${cells}</div></div>`;
  }).join('');}
function jump(bn){
  S.cats.clear();S.grades.clear();S.tier='all';S.q=bn.toLowerCase();
  document.getElementById('q').value=bn;
  document.querySelectorAll('.seg').forEach(x=>x.classList.toggle('on',x.dataset.tier==='all'));
  document.querySelector('.tab[data-tab="list"]').click();render();}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
render();
</script></body></html>
