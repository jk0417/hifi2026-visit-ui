const S={cats:new Set(),grades:new Set(),t100:false,sort:'rank',q:''};

const catBox=document.getElementById('cats');
["🍄 약용버섯", "🌿 인삼·황기·강장류", "🫐 베리·항산화", "😴 수면·진정", "🧬 아미노산", "🥈 일반비타민군", "🧴 콜라겐·펩타이드(피부·관절)", "🥩 식물성 단백", "🌾 식이섬유", "🐟 오메가-3", "🌱 기타 식물추출", "🍯 감미료·당대체", "🟫 팔라티노스(독립)", "💡 컨셉전용·기타"].forEach(c=>{const e=document.createElement('span');e.className='chip';e.textContent=c;

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{

  const map=t.dataset.tab==='map';
  document.getElementById('map').classList.toggle('hide',!map);
  document.getElementById('list').classList.toggle('hide',map);
  document.getElementById('listctl').classList.toggle('hide',map);
  if(map)drawMap();}));

const boothKey=b=>{const m=(b.booth||'').match(/(\d+)([A-Za-z]*)(\d*)/);return m?[+m[1]||99,m[2]||'Z',+m[3]||999]:[99,'Z',999];};
function filt(){
  let r=D.booths.filter(b=>{
    if(S.t100&&!b.top100)return false;
    if(S.grades.size&&!S.grades.has(b.grade))return false;
    if(S.cats.size&&!b.cats.some(c=>S.cats.has(c)))return false;
    if(S.q){const h=(b.co+' '+b.ing+' '+b.booth+' '+b.cats.join(' ')+' '+b.reasons.join(' ')).toLowerCase();if(!h.includes(S.q))return false;}
    return true;});
  if(S.sort==='booth')r.sort((a,b)=>{const x=boothKey(a),y=boothKey(b);return x[0]-y[0]||x[1].localeCompare(y[1])||x[2]-y[2];});
  else r.sort((a,b)=>a.rank-b.rank);
  return r;}
function render(){
  const r=filt();
  const f=[...S.cats,...S.grades];if(S.t100)f.push('TOP100');
  document.getElementById('count').textContent=`${r.length}개 표시`+(f.length?` · 필터: ${f.join(', ')}`:'');
  document.getElementById('list').innerHTML=r.map(card).join('')||'<div class="count">조건에 맞는 부스 없음</div>';}
function card(b){
  const tags=b.tags.map(t=>`<span class="tg">${t}</span>`).join('');
  const rs=b.reasons.map(x=>`<span class="rsc">${esc(x)}</span>`).join('');
  const chk=b.check?`<div class="chk">🔍 현장확인: ${esc(b.check)}</div>`:'';
  return `<div class="card ${b.top100?'t100':''}">
    <div class="chead">
      <span class="rank">${b.rank}<small>순위</small></span>
      <span class="co">${b.grade} ${b.is30?'<span class="star">⭐</span>':''}${esc(b.co)}</span>
    </div>
    <div class="meta">📍 ${b.booth} · 홀 ${b.hall} · ${b.nat}</div>
    <div class="tags">${tags}</div>
    <div class="ing">${esc(b.ing)}</div>
    <div class="rwhy">왜 선정?</div>
    <div class="rs">${rs}</div>
    <div class="why">${esc(b.why)}</div>${chk}
  </div>`;}
function drawMap(){
  const halls={};D.booths.forEach(b=>{(halls[b.hall]=halls[b.hall]||[]).push(b);});
  const order=Object.keys(halls).sort();
  document.getElementById('map').innerHTML=order.map(h=>{
    const bs=halls[h].slice().sort((a,b)=>{const x=boothKey(a),y=boothKey(b);return x[0]-y[0]||x[1].localeCompare(y[1])||x[2]-y[2];});
    const cells=bs.map(b=>`<span class="mb" onclick="jump('${b.booth}')">${b.booth}<span class="mbs">#${b.rank}</span></span>`).join('');
    return `<div class="hall"><div class="htitle">홀 ${h} — ${bs.length}부스</div><div class="grid">${cells}</div></div>`;
  }).join('');}
function jump(bn){
  S.cats.clear();S.grades.clear();S.t100=false;S.q=bn.toLowerCase();
  document.getElementById('q').value=bn;
  document.querySelector('.tab[data-tab="list"]').click();render();}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
render();
